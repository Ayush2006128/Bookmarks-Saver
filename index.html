<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.svg" type="svg+xml">
    <title>Bookmarks Saver</title>
</head>
<body>
    <div class="app-container">
        <h1 class="heading-text">Bookmarks Saver</h1>
        <input type="text" id="name" placeholder="Enter bookmark name" class="input-field" />
        <input type="url" id="url" placeholder="Enter bookmark URL" class="input-field" />
        <button id="save-btn" class="save-button">Save Bookmark</button>
        <div class="bookmark-list">
            <ul id="bookmarks"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
